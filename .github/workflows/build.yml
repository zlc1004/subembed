name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: subembed
            asset_name: subembed-linux-amd64
          - os: macos-latest
            artifact_name: subembed
            asset_name: subembed-macos-amd64
          - os: windows-latest
            artifact_name: subembed.exe
            asset_name: subembed-windows-amd64.exe

    steps:
    - uses: actions/checkout@v3

    - name: Build (Linux/macOS)
      if: runner.os != 'Windows'
      run: make

    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: |
        g++ -std=c++17 -Wall -Wextra -O2 -o subembed.exe main.cpp

    - name: Test
      run: ./${{ matrix.artifact_name }} --help
      if: runner.os != 'Windows'

    - name: Test (Windows)
      run: .\${{ matrix.artifact_name }} --help
      if: runner.os == 'Windows'

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.asset_name }}
        path: ${{ matrix.artifact_name }}
        retention-days: 30

    - name: Upload release asset
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./${{ matrix.artifact_name }}
        asset_name: ${{ matrix.asset_name }}
        asset_content_type: application/octet-stream
