name: Build Project

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: subembed
            asset_name: subembed-linux-amd64
          - os: macos-latest
            artifact_name: subembed
            asset_name: subembed-macos-arm64
          - os: windows-latest
            artifact_name: subembed.exe
            asset_name: subembed-windows-amd64.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build (Linux/macOS)
      if: runner.os != 'Windows'
      run: make

    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: |
        g++ -std=c++17 -Wall -Wextra -O2 -o subembed.exe main.cpp

    - name: Test
      run: ./${{ matrix.artifact_name }} --help
      if: runner.os != 'Windows'

    - name: Test (Windows)
      run: .\${{ matrix.artifact_name }} --help
      if: runner.os == 'Windows'

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: ${{ matrix.artifact_name }}
